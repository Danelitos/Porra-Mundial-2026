name: Sincronizar resultados

# Sincroniza los resultados del Mundial desde football-data.org y los guarda en
# el repo (data/*.json). Al hacer commit sobre main, GitHub Pages republica la
# web con el ranking ya actualizado. Así nadie depende de que la API responda en
# su navegador: el navegador solo lee los JSON ya guardados.

on:
  schedule:
    # Cada 3 minutos. OJO: GitHub no garantiza la puntualidad de los crons y bajo
    # carga puede retrasarlos a 5-15 min; es lo máximo que se puede afinar sin
    # pagar. (Solo hace commit si algo cambió.)
    - cron: "*/3 * * * *"
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

# Evita que dos ejecuciones se pisen al hacer push.
concurrency:
  group: sync-results
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # sync-results.js solo usa módulos nativos de Node + ficheros locales,
      # así que no hace falta `npm install`.
      - name: Sincronizar
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/sync-results.js

      - name: Commit y push si hay cambios
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "Sin cambios; nada que publicar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-sync resultados ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # Reintenta si main se movió mientras tanto. Nuestro commit solo toca
          # data/ (un snapshot completo regenerado desde la API), así que ante un
          # conflicto siempre gana nuestra versión recién sincronizada: por eso el
          # rebase usa -X theirs (resuelve los choques a favor de nuestros datos)
          # y deja intacto el resto de ficheros (app.js, estilos, etc.).
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then
                echo "Publicado en el intento $i."
                exit 0
              fi
            else
              echo "Rebase con conflictos; abortando para reintentar limpio."
              git rebase --abort || true
            fi
            echo "Push falló (intento $i), reintentando…"
            sleep $((RANDOM % 4 + 3))
          done
          echo "No se pudo publicar tras varios intentos."
          exit 1
